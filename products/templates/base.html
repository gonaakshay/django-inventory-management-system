<!DOCTYPE html>
<html>

<head>

    <title>Inventory Management System</title>

    <style>
        .pagination {

            margin-top: 20px;
            text-align: center;

        }

        .pagination a {

            text-decoration: none;
            background: #3498db;
            color: white;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            font-weight: bold;

        }

        .pagination a:hover {

            background: #2980b9;

        }

        .pagination span {

            font-size: 18px;
            font-weight: bold;
            margin: 0 10px;

        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #f4f6f9;
        }

        .navbar {

            background: #2c3e50;
            padding: 15px;

        }

        .navbar a {

            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;

        }

        .navbar a:hover {

            color: #f1c40f;

        }

        .container {

            width: 90%;
            margin: 30px auto;

        }

        .cards {

            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;

        }

        .card {

            background: white;
            width: 250px;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);

            transition: 0.3s;

        }

        .card:hover {

            transform: translateY(-8px);

        }

        .card h2 {

            color: #3498db;

        }

        h1 {

            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;

        }

        .btn {

            background: #3498db;
            color: white;
            padding: 10px 15px;
            border: none;
            text-decoration: none;
            border-radius: 5px;

        }

        .btn:hover {

            background: #2980b9;

        }

        table {

            width: 100%;
            border-collapse: collapse;
            background: white;

        }

        table th {

            background: #34495e;
            color: white;
            padding: 12px;

        }

        table td {

            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;

        }

        tr:hover {

            background: #f5f5f5;

        }

        form {

            background: white;
            padding: 20px;
            border-radius: 10px;

        }

        input,
        textarea,
        select {

            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;

        }

        button {

            background: #27ae60;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;

        }

        button:hover {

            background: #229954;

        }

        .login-container {

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;

        }

        .login-card {

            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.2);

        }

        .login-card h2 {

            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;

        }

        .login-card input {

            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;

        }

        .login-card button {

            width: 100%;
            padding: 12px;
        }

        footer{

            text-align:center;
            padding:20px;
            margin-top:40px;
            color:#666;
        }
    </style>

</head>

<body>

    {% if user.is_authenticated %}

    <div class="navbar">

        <a href="{% url 'dashboard' %}">
            Dashboard
        </a>

        <a href="{% url 'product_list' %}">
            Products
        </a>

        <a href="{% url 'product_create' %}">
            Add Product
        </a>

        <a href="{% url 'deleted_products' %}">
            Deleted Products
        </a>

        <a href="{% url 'logout' %}">
            Logout
        </a>

        <span style="color:white; margin-right:20px;">

            Welcome, {{ user.username }}
        </span>

    </div>

    {% endif %}

    <div class="container">

        <h1>Inventory Management System</h1>

        {% block content %}
        {% endblock %}

    </div>

    <footer>

        Inventory Management System © 2026

    </footer>

</body>

</html>
